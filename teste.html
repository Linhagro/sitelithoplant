<!-- ===================================================
     HEADER - LINHAGRO (COM REDES SOCIAIS NO TOPO)
     Atualizado: 23/03/2026
=================================================== -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linhagro - Exemplo Header Redes Sociais</title>

  <!-- Fonte e Ícones -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* ======= TOPO DAS REDES ======= */
    .top-bar {
      background-color: #274433;
      color: #f5f5f5;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0.3rem 2rem;
      gap: 1rem;
    }

    .top-bar a {
      color: #f5f5f5;
      transition: color 0.3s ease;
    }

    .top-bar a:hover {
      color: #F4A261;
    }

    /* ======= HEADER PRINCIPAL ======= */
    .header {
      position: fixed;
      top: 30px; /* empurra para baixo do topo verde */
      left: 0;
      width: 100%;
      z-index: 1000;
      background: transparent;
      transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
    }

    .header.header-overlay {
      background-color: #274433;
      border-bottom-color: rgba(0, 0, 0, 0.35);
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
      font-family: 'Poppins', sans-serif;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .logo-img {
      height: 60px;
      width: auto;
      object-fit: contain;
    }

    /* Menu */
    .nav-menu {
      display: flex;
      gap: 0.5rem;
      flex: 1;
      justify-content: center;
    }

    .nav-link {
      text-decoration: none;
      color: #f5f5f5;
      font-weight: 300;
      font-size: 15px;
      padding: 0.6rem 1rem;
      letter-spacing: 0.3px;
      transition: color 0.3s ease;
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 80%;
      height: 2px;
      background: linear-gradient(90deg, #F4A261, #E8965A);
      transition: transform 0.3s ease;
    }

    .nav-link:hover {
      color: #F4A261;
    }

    .nav-link:hover::after {
      transform: translateX(-50%) scaleX(1);
    }

    /* Botão mobile */
    .mobile-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #f5f5f5;
      padding: 0.5rem;
    }

    /* ======= RESPONSIVO ======= */
    @media (max-width: 768px) {
      .top-bar {
        justify-content: center;
        padding: 0.4rem 1rem;
      }

      .navbar {
        flex-wrap: wrap;
        padding: 0.75rem 1rem;
      }

      .logo-img {
        height: 40px;
      }

      .nav-menu {
        position: fixed;
        top: 100px;
        left: -100%;
        width: 100%;
        height: calc(100vh - 100px);
        background: #000;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 2rem;
        transition: left 0.3s ease;
      }

      .nav-menu.active {
        left: 0;
      }

      .nav-link {
        font-size: 18px;
        width: 100%;
        text-align: center;
        padding: 1rem 0;
        border-bottom: 1px solid #222;
      }

      .mobile-toggle {
        display: block;
      }
    }
  </style>
</head>

<body>

  <!-- Topo com redes sociais -->
  <div class="top-bar">
    <a href="https://www.facebook.com/linhagro" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
    <a href="https://www.instagram.com/linhagro" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
    <a href="https://www.linkedin.com/company/linhagro" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
  </div>

  <!-- Header principal -->
  <header class="header" id="header">
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">
          <img src="assets/imagens/LOGO-LINHAGRO-BRANCA.svg" alt="Linhagro" class="logo-img">
        </a>
      </div>

      <div class="nav-menu" id="nav-menu">
        <a href="#" class="nav-link active">Início</a>
        <a href="#" class="nav-link">Nossos Destaques</a>
        <a href="#" class="nav-link">Quem Somos</a>
        <a href="#" class="nav-link">Depoimentos</a>
        <a href="#" class="nav-link">Consultores</a>
      </div>

      <button class="mobile-toggle" id="mobile-toggle" aria-label="Abrir menu">
        <i class="fas fa-bars"></i>
      </button>
    </nav>
  </header>

  <script>
    const mobileToggle = document.getElementById("mobile-toggle");
    const navMenu = document.getElementById("nav-menu");
    const header = document.getElementById("header");

    mobileToggle.addEventListener("click", () => {
      navMenu.classList.toggle("active");
    });

    // Torna o fundo verde quando rolar
    window.addEventListener("scroll", () => {
      if (window.scrollY > 50) {
        header.classList.add("header-overlay");
      } else {
        header.classList.remove("header-overlay");
      }
    });
  </script>

</body>
</html>
